<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciando sesión… · SOPHIA</title>
  <link rel="stylesheet" href="/assets/css/base.css">
  <style>
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--color-bg);
    }
    .auth-status {
      text-align: center;
      max-width: 420px;
      padding: var(--s-8);
    }
    .auth-status p { color: var(--color-text-muted); margin-top: var(--s-5); }
    .auth-status .err-detail {
      background: var(--color-danger-soft);
      color: var(--color-danger);
      padding: var(--s-3) var(--s-4);
      border-radius: var(--r-md);
      margin-top: var(--s-4);
      font-size: 0.8125rem;
      text-align: left;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="auth-status">
    <div class="spinner" style="margin:0 auto;"></div>
    <p id="msg">Iniciando sesión…</p>
    <div id="errDetail" class="err-detail hidden"></div>
  </div>

  <script type="module">
    import { supabase } from "/assets/js/supabase-client.js";

    const $msg = document.getElementById("msg");
    const $err = document.getElementById("errDetail");

    function fail(reason, detail) {
      console.error("[auth/callback]", reason, detail);
      $msg.textContent = reason;
      if (detail) {
        $err.textContent = String(detail);
        $err.classList.remove("hidden");
      }
      setTimeout(() => location.replace("/"), 4000);
    }

    function success() {
      $msg.textContent = "✓ Sesión iniciada. Redirigiendo…";
      const target =
        sessionStorage.getItem("sophia_post_login_redirect") || "/app/cursos";
      sessionStorage.removeItem("sophia_post_login_redirect");
      location.replace(target);
    }

    try {
      const url = new URL(location.href);
      const code = url.searchParams.get("code");

      // Errores que mande el provider (e.g. user cancela en Google)
      const errorParam =
        url.searchParams.get("error") ||
        url.hash.match(/error=([^&]+)/)?.[1];
      const errorDescription =
        url.searchParams.get("error_description") ||
        url.hash.match(/error_description=([^&]+)/)?.[1];

      if (errorParam) {
        const human = errorDescription
          ? decodeURIComponent(errorDescription).replace(/\+/g, " ")
          : `Error de autenticación: ${decodeURIComponent(errorParam)}`;
        fail(human);
      } else if (code) {
        // PKCE flow: intercambiar code por sesión explícitamente.
        const { error } = await supabase.auth.exchangeCodeForSession(code);
        if (error) {
          fail("No pudimos completar el inicio de sesión.", error.message);
        } else {
          success();
        }
      } else {
        // Magic link u otro flow donde detectSessionInUrl ya hizo el trabajo.
        // Polleamos brevemente por la sesión.
        let session = null;
        for (let i = 0; i < 10; i++) {
          const { data } = await supabase.auth.getSession();
          if (data.session) { session = data.session; break; }
          await new Promise(r => setTimeout(r, 200));
        }
        if (!session) {
          fail("No pudimos iniciar tu sesión. Vuelve a intentarlo.");
        } else {
          success();
        }
      }
    } catch (e) {
      fail("Error inesperado iniciando sesión.", e?.message || String(e));
    }
  </script>
</body>
</html>
