<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autenticando · SOPHIA</title>
  <link rel="stylesheet" href="/assets/css/base.css">
  <style>
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--color-bg);
    }
    .callback {
      text-align: center;
      max-width: 380px;
      padding: var(--s-8);
    }
    .callback__title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 500;
      letter-spacing: -0.01em;
      margin-bottom: var(--s-2);
    }
    .callback__subtitle {
      color: var(--color-text-muted);
      font-size: 0.9375rem;
      margin-bottom: var(--s-6);
    }
    .callback .spinner {
      width: 28px;
      height: 28px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <div class="callback">
    <h1 class="callback__title">Verificando tu acceso</h1>
    <p class="callback__subtitle" id="callbackMsg">Solo un momento mientras te llevamos a tu portal…</p>
    <div class="spinner"></div>
  </div>

  <script type="module">
    import { supabase } from "/assets/js/supabase-client.js";
    import { bootstrapPersona } from "/assets/js/auth.js";

    const msgEl = document.getElementById("callbackMsg");
    const POST_KEY = "sophia_post_login_redirect";

    async function handle() {
      // Wait briefly for Supabase to detect the URL hash/code params
      const { data, error } = await supabase.auth.getSession();
      if (error || !data.session) {
        // Listen for the session to be established (PKCE/email callback)
        const { data: sub } = supabase.auth.onAuthStateChange((event, session) => {
          if (session) finish();
        });
        // Hard timeout
        setTimeout(() => {
          if (!data.session) {
            msgEl.textContent = "No pudimos verificar tu acceso. Intenta de nuevo.";
            setTimeout(() => location.replace("/"), 2500);
          }
        }, 8000);
        return;
      }
      finish();
    }

    async function finish() {
      try {
        await bootstrapPersona();
      } catch (e) {
        console.error("bootstrapPersona failed:", e);
        msgEl.textContent = "Error registrando tu cuenta. Contacta a soporte.";
        setTimeout(() => location.replace("/"), 3000);
        return;
      }
      const target = sessionStorage.getItem(POST_KEY) || "/app/cursos";
      sessionStorage.removeItem(POST_KEY);
      location.replace(target);
    }

    handle();
  </script>
</body>
</html>
