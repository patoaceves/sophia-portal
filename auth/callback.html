<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciando sesión… · SOPHIA</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/favicons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/img/favicons/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/img/favicons/apple-touch-icon.png">
  <link rel="stylesheet" href="/assets/css/base.css">
  <style>
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--color-bg);
      margin: 0;
    }
    .auth-status {
      text-align: center;
      max-width: 460px;
      padding: var(--s-8);
      width: 100%;
    }
    .auth-status .err-detail {
      background: var(--color-danger-soft);
      color: var(--color-danger);
      padding: var(--s-3) var(--s-4);
      border-radius: var(--r-md);
      margin-top: var(--s-4);
      font-size: 0.8125rem;
      text-align: left;
    }
    .hidden { display: none; }

    /* Override page-loader to be inline-friendly inside this minimal page */
    .page-loader {
      min-height: auto;
      padding: 0;
    }
  </style>
</head>
<body>
  <div class="auth-status">
    <div class="page-loader" data-context="portal">
      <div class="page-loader__inner">
        <div class="spinner spinner--wheel" role="status" aria-live="polite">
          <span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span>
        </div>
        <div class="page-loader__text">
          <span class="page-loader__msg" id="msg">Iniciando tu sesión</span><span class="page-loader__dots"><span>.</span><span>.</span><span>.</span></span>
        </div>
      </div>
    </div>
    <div id="errDetail" class="err-detail hidden"></div>
  </div>

  <script>
    // Pre-bootstrap text rotation (kicks off immediately)
    (function() {
      var msgs = ["Iniciando tu sesión", "Verificando tu cuenta", "Cargando tu progreso", "Preparando tu camino"];
      var i = 0;
      var el = document.getElementById("msg");
      window.__rot = setInterval(function() {
        if (!el || !document.body.contains(el)) { clearInterval(window.__rot); return; }
        i = (i + 1) % msgs.length;
        el.style.transition = "opacity 0.22s ease";
        el.style.opacity = "0";
        setTimeout(function() { if (el) { el.textContent = msgs[i]; el.style.opacity = "1"; } }, 220);
      }, 2000);
    })();
  </script>

  <script type="module">
    import { supabase } from "/assets/js/supabase-client.js";
    import { tryClaimPendingInvite, getPendingInvite, bootstrapPersona, needsOnboarding } from "/assets/js/auth.js";

    const $msg = document.getElementById("msg");
    const $err = document.getElementById("errDetail");
    function clearRotation() {
      if (window.__rot) { clearInterval(window.__rot); window.__rot = null; }
    }

    function fail(reason, detail) {
      console.error("[auth/callback]", reason, detail);
      clearRotation();
      $msg.textContent = reason;
      // Stop animating dots when there's an error
      const dotsEl = document.querySelector(".page-loader__dots");
      if (dotsEl) dotsEl.style.display = "none";
      if (detail) {
        $err.textContent = String(detail);
        $err.classList.remove("hidden");
      }
      setTimeout(() => location.replace("/"), 4000);
    }

    /**
     * Decide el destino post-login. Hace bootstrap (creando/refrescando la
     * Persona en Airtable) y revisa si falta onboarding. Si falta, manda a
     * /app/bienvenida; si no, al destino normal (/app/cursos por default).
     * Esto evita el "flash de mis cursos" que el usuario veía antes.
     */
    async function decideAndRedirect(targetOverride) {
      clearRotation();
      try {
        $msg.textContent = "Preparando tu perfil";
        const persona = await bootstrapPersona();
        if (needsOnboarding(persona)) {
          location.replace("/app/bienvenida");
          return;
        }
      } catch (e) {
        // Si el bootstrap falla, no bloqueamos al usuario — lo mandamos al
        // destino normal. requireAuth() en la siguiente página manejará el
        // error con su flujo normal de error UI.
        console.warn("[auth/callback] bootstrap failed, continuing:", e);
      }
      $msg.innerHTML = `<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-3px;margin-right:6px;color:var(--color-success);"><path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round"/></svg>Sesión iniciada. Redirigiendo`;
      const target = targetOverride
        || sessionStorage.getItem("sophia_post_login_redirect")
        || "/app/cursos";
      sessionStorage.removeItem("sophia_post_login_redirect");
      location.replace(target);
    }

    try {
      const url = new URL(location.href);

      const errorParam =
        url.searchParams.get("error") ||
        url.hash.match(/error=([^&]+)/)?.[1];
      const errorDescription =
        url.searchParams.get("error_description") ||
        url.hash.match(/error_description=([^&]+)/)?.[1];

      if (errorParam) {
        const human = errorDescription
          ? decodeURIComponent(errorDescription).replace(/\+/g, " ")
          : `Error de autenticación: ${decodeURIComponent(errorParam)}`;
        fail(human);
      } else {
        let session = null;
        for (let i = 0; i < 15; i++) {
          const { data } = await supabase.auth.getSession();
          if (data.session) { session = data.session; break; }
          await new Promise(r => setTimeout(r, 200));
        }
        if (!session) {
          fail("No pudimos iniciar tu sesión. Vuelve a intentarlo.");
        } else {
          // ── Canjear invitación pendiente (si la hay) ───────────
          // Esto se ejecuta ANTES del bootstrap-cache de cursos.html
          // para que la inscripción ya exista cuando lleguemos ahí.
          if (getPendingInvite()) {
            $msg.textContent = "Activando tu invitación";
            try {
              const result = await tryClaimPendingInvite();
              if (result.kind === "claimed" || result.kind === "already") {
                // Inscripción canjeada (o ya existía). Mandamos siempre al
                // dashboard de cursos: ahí el usuario ve TODOS sus cursos
                // y puede entrar al que quiera. Esto es consistente con
                // logins repetidos y con multi-curso.
                decideAndRedirect();
              } else if (result.kind === "retry") {
                // Sync pendiente. cursos.html reintentará.
                console.warn("[claim] sync pending, will retry on cursos.html");
                decideAndRedirect();
              } else if (result.kind === "fatal") {
                console.error("[claim] fatal:", result.error);
                // No bloquear el login, solo log + mensaje en cursos.html
                sessionStorage.setItem(
                  "sophia_invite_error",
                  result.error?.message || "No pudimos activar tu invitación.",
                );
                decideAndRedirect();
              } else {
                decideAndRedirect();
              }
            } catch (e) {
              console.error("[claim] unexpected:", e);
              decideAndRedirect();
            }
          } else {
            decideAndRedirect();
          }
        }
      }
    } catch (e) {
      fail("Error inesperado iniciando sesión.", e?.message || String(e));
    }
  </script>
</body>
</html>
