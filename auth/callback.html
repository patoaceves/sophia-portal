<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Iniciando sesión…</title>
<link rel="stylesheet" href="/assets/css/main.css">
<style>
  body {
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: var(--sophia-cream);
  }
  .auth-status {
    text-align: center;
    max-width: 400px;
    padding: var(--s-7);
  }
</style>
</head>
<body>
<div class="auth-status">
  <div class="spinner" style="margin: 0 auto var(--s-5);"></div>
  <p id="msg" style="color: var(--sophia-graphite);">Iniciando sesión…</p>
</div>

<script src="/assets/js/config.js"></script>
<script type="module">
  import { supabase } from '/assets/js/supabase-client.js';

  const $msg = document.getElementById('msg');

  // Supabase con detectSessionInUrl:true ya consume el hash automáticamente
  // al instanciarse el cliente. Solo verificamos sesión.
  let session = null;
  for (let i = 0; i < 8; i++) {
    const { data } = await supabase.auth.getSession();
    if (data.session) { session = data.session; break; }
    await new Promise(r => setTimeout(r, 200));
  }

  if (!session) {
    $msg.textContent = 'No pudimos iniciar tu sesión. Vuelve a intentarlo.';
    setTimeout(() => window.location.replace('/'), 2500);
  } else {
    $msg.textContent = '✓ Sesión iniciada. Redirigiendo…';
    // Si había un `next` antes de OAuth, respetarlo
    const next = new URLSearchParams(window.location.search).get('next') || '/app';
    window.location.replace(next);
  }
</script>
</body>
</html>
