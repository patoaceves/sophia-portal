<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lección · SOPHIA</title>
  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/shell.css">
</head>
<body>
  <div class="full-page-loader">
    <div class="page-loader__inner">
      <div class="spinner spinner--wheel" role="status" aria-live="polite">
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
      </div>
      <div class="page-loader__text">
        <span class="page-loader__msg" id="bootMsg">Abriendo tu lección</span><span class="page-loader__dots"><span>.</span><span>.</span><span>.</span></span>
      </div>
    </div>
  </div>
  <script>
    (function() {
      var msgs = ["Abriendo tu lección", "Cargando el contenido", "Casi listo"];
      var i = 0;
      var el = document.getElementById("bootMsg");
      var iv = setInterval(function() {
        if (!el || !document.body.contains(el)) { clearInterval(iv); return; }
        i = (i + 1) % msgs.length;
        el.style.transition = "opacity 0.22s ease";
        el.style.opacity = "0";
        setTimeout(function() { if (el) { el.textContent = msgs[i]; el.style.opacity = "1"; } }, 220);
      }, 2200);
    })();
  </script>
  <script type="module" src="/assets/js/leccion.js"></script>
</body>
</html>
