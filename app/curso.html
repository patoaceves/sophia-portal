<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Curso · SOPHIA</title>
<link rel="stylesheet" href="/assets/css/main.css">
</head>
<body>

<div class="player-layout">

  <!-- ─── Sidebar: capítulos & lecciones ─── -->
  <aside class="player-sidebar" id="player-sidebar">
    <a href="/app/cursos" style="font-size: 13px; color: var(--sophia-mist);">← Mis cursos</a>
    <h2 class="course-title" id="course-title" style="margin-top: var(--s-3);">Cargando…</h2>
    <div id="chapters-list">
      <div class="loading-state">
        <div class="spinner"></div>
      </div>
    </div>
  </aside>

  <!-- ─── Content: lección actual ─── -->
  <section class="player-content" id="lesson-content-host">
    <div class="loading-state">
      <div class="spinner"></div>
      <p>Cargando lección…</p>
    </div>
  </section>
</div>

<script src="/assets/js/config.js"></script>
<script type="module">
  import { requireAuth } from '/assets/js/auth.js';
  import { api } from '/assets/js/api.js';

  await requireAuth();

  const params = new URLSearchParams(window.location.search);
  const slug = params.get('slug') || '';
  const leccionId = params.get('leccion') || null;

  if (!slug) {
    window.location.replace('/app/cursos');
  }

  const $title = document.getElementById('course-title');
  const $chapters = document.getElementById('chapters-list');
  const $content = document.getElementById('lesson-content-host');

  try {
    const { curso, capitulos, inscripcionId } = await api.curso(slug);
    document.title = `${curso.titulo} · SOPHIA`;
    $title.textContent = curso.titulo;

    // Primera lección si no se pasó una específica
    let activeLeccionId = leccionId;
    if (!activeLeccionId) {
      const firstCap = capitulos.find(c => c.lecciones?.length > 0);
      if (firstCap) activeLeccionId = firstCap.lecciones[0].id;
    }

    // Render sidebar
    $chapters.innerHTML = capitulos.map(cap => `
      <div class="chapter">
        <div class="chapter-title">${cap.orden}. ${cap.titulo}</div>
        <ul class="lesson-list">
          ${(cap.lecciones || []).map(l => `
            <li>
              <a href="/app/curso/${slug}?leccion=${l.id}"
                 class="${l.id === activeLeccionId ? 'is-current' : ''}">
                <span class="lesson-status ${l.completada ? 'is-done' : ''}"></span>
                <span style="flex:1;">
                  ${l.titulo}
                  ${l.etiqueta ? `<span class="lesson-tag">${l.etiqueta}</span>` : ''}
                </span>
              </a>
            </li>
          `).join('')}
        </ul>
      </div>
    `).join('');

    // Render content
    if (activeLeccionId) {
      const { leccion, prevId, nextId } = await api.leccion(activeLeccionId);
      renderLesson(leccion, prevId, nextId, slug, inscripcionId);
    } else {
      $content.innerHTML = `<div class="card"><h2>${curso.titulo}</h2><p>Aún no hay lecciones disponibles.</p></div>`;
    }

  } catch (e) {
    $content.innerHTML = `<div class="card">
      <h2>Hubo un error</h2>
      <p style="color: var(--sophia-graphite);">${e.message}</p>
      <a href="/app/cursos" class="btn btn-ghost">← Volver a mis cursos</a>
    </div>`;
  }

  function renderLesson(l, prevId, nextId, slug, inscripcionId) {
    const tag = l.etiqueta ? `<span class="lesson-tag">${l.etiqueta}</span>` : '';
    let body = '';

    switch (l.tipo) {
      case 'texto':
        body = `<div class="lesson-content">${l.contenidoHTML || ''}</div>`;
        break;
      case 'video':
        body = `<div class="lesson-content">
          <iframe src="${l.urlVideo}" style="width:100%; aspect-ratio:16/9; border:0; border-radius: var(--r-md);" allowfullscreen></iframe>
          ${l.contenidoHTML || ''}
        </div>`;
        break;
      case 'pdf':
        body = `<div class="lesson-content">
          ${l.archivoUrl ? `<iframe src="${l.archivoUrl}" style="width:100%; height:80vh; border:0; border-radius: var(--r-md);"></iframe>` : ''}
          ${l.contenidoHTML || ''}
        </div>`;
        break;
      case 'autoeval':
        // Si la URL externa es la del Test de Felicidad, abrir DENTRO del portal
        body = `<div class="lesson-content">
          ${l.contenidoHTML || ''}
          <div style="margin-top: var(--s-6);">
            <a href="/app/test-felicidad?inscripcion=${inscripcionId}&leccion=${l.id}" class="btn btn-primary btn-lg">
              Comenzar Test de Felicidad →
            </a>
          </div>
        </div>`;
        break;
      case 'sesion_live':
        body = `<div class="lesson-content">
          ${l.contenidoHTML || ''}
          ${l.urlExterna ? `<a href="${l.urlExterna}" target="_blank" class="btn btn-primary">Unirme a la sesión →</a>` : '<p><em>El enlace estará disponible próximamente.</em></p>'}
        </div>`;
        break;
      default:
        body = `<div class="lesson-content">${l.contenidoHTML || '<p>Lección sin contenido.</p>'}</div>`;
    }

    $content.innerHTML = `
      <div class="lesson-meta">${tag} <span>·</span> <span>${l.tipo}</span></div>
      <h1>${l.titulo}</h1>
      ${body}
      <div class="lesson-actions">
        ${prevId ? `<a href="/app/curso/${slug}?leccion=${prevId}" class="btn btn-ghost">← Anterior</a>` : '<span></span>'}
        <button class="btn btn-primary" id="btn-complete">Marcar como completada</button>
        ${nextId ? `<a href="/app/curso/${slug}?leccion=${nextId}" class="btn btn-primary">Siguiente →</a>` : ''}
      </div>
    `;

    document.getElementById('btn-complete')?.addEventListener('click', async (e) => {
      e.target.disabled = true;
      try {
        await api.marcarLeccion(l.id, inscripcionId);
        e.target.textContent = '✓ Completada';
      } catch (err) {
        e.target.disabled = false;
        e.target.textContent = `Error: ${err.message}`;
      }
    });
  }
</script>
</body>
</html>
